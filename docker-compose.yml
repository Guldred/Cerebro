# Local infrastructure for Cerebro. One system: Postgres with the pgvector
# extension (vector + tsvector + metadata/ACL all live here, per the plan).
#
#   docker compose up -d
#   npm run db:migrate && npm run db:seed
#   npm run start:dev
#
# The pgvector/pgvector image ships the extension preinstalled; `001_init.sql`
# runs `CREATE EXTENSION IF NOT EXISTS vector`.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cerebro-postgres
    environment:
      POSTGRES_USER: cerebro
      POSTGRES_PASSWORD: cerebro
      POSTGRES_DB: cerebro
    # Published on 5433 to avoid clashing with a local Postgres on the default 5432.
    ports:
      - "5433:5432"
    volumes:
      - cerebro-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerebro -d cerebro"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional local embedding server (OpenAI-compatible) for real multilingual
  # semantic retrieval with bge-m3 — no cloud keys. Start it with the profile:
  #   docker compose --profile embeddings up -d ollama
  #   docker exec cerebro-ollama ollama pull bge-m3
  # then set EMBEDDING_PROVIDER=openai-compatible, EMBEDDING_BASE_URL=http://localhost:11434/v1,
  # EMBEDDING_MODEL=bge-m3 in .env and re-run `npm run db:seed`.
  ollama:
    image: ollama/ollama:latest
    container_name: cerebro-ollama
    profiles: ["embeddings"]
    ports:
      - "11434:11434"
    volumes:
      - cerebro-ollama:/root/.ollama

volumes:
  cerebro-pgdata:
  cerebro-ollama:
